<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Web-Based Alpine Linux VM</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #screen_container {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        #screen_container canvas {
            display: block; max-width: 100%; max-height: 100%; object-fit: contain;
        }
        
        .utility_bar {
            position: absolute; top: 20px; right: 20px;
            display: flex; gap: 10px; z-index: 9999;
        }
        .action_btn {
            background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
            padding: 10px 16px; border-radius: 20px; font-weight: bold;
            font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #kbd_toggle { background: #58a6ff; color: #fff; border: none; }
        #save_state { background: #238636; color: #fff; border: none; }

        #keyboard_overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(22, 27, 34, 0.95);
            border-top: 1px solid #30363d; padding: 6px;
            display: flex; flex-direction: column; gap: 6px;
            z-index: 9998; transform: translateY(0);
            transition: transform 0.2s ease-in-out;
        }
        #keyboard_overlay.hidden {
            transform: translateY(100%);
        }
        .keyboard_row {
            display: flex; justify-content: center; width: 100%; gap: 4px;
        }
        .key {
            flex: 1; max-width: 60px; height: 42px;
            background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 500; font-family: monospace;
        }
        .key:active { background: #58a6ff; color: #fff; }
        
        .key.wide { flex: 1.5; max-width: 90px; background: #30363d; }
        .key.space { flex: 3; max-width: 220px; }
        .key.modifier { background: #1f242c; color: #58a6ff; font-size: 12px; }
        .key.arrow { background: #30363d; font-size: 16px; }
    </style>
    <script src="libv86.js"></script>
</head>
<body>

    <div class="utility_bar">
        <button id="save_state" class="action_btn">Save State</button>
        <button id="kbd_toggle" class="action_btn">Hide Kbd</button>
    </div>

    <div id="screen_container"></div>

    <div id="keyboard_overlay">
        <div class="keyboard_row">
            <button class="key modifier wide" data-scancode="0x01">ESC</button>
            <button class="key" data-scancode="0x02">1</button>
            <button class="key" data-scancode="0x03">2</button>
            <button class="key" data-scancode="0x04">3</button>
            <button class="key" data-scancode="0x05">4</button>
            <button class="key" data-scancode="0x06">5</button>
            <button class="key" data-scancode="0x07">6</button>
            <button class="key" data-scancode="0x08">7</button>
            <button class="key" data-scancode="0x09">8</button>
            <button class="key" data-scancode="0x0A">9</button>
            <button class="key" data-scancode="0x0B">0</button>
            <button class="key wide" data-scancode="0x0E">BKSP</button>
        </div>
        <div class="keyboard_row">
            <button class="key modifier wide" data-scancode="0x0F">TAB</button>
            <button class="key" data-scancode="0x10">q</button>
            <button class="key" data-scancode="0x11">w</button>
            <button class="key" data-scancode="0x12">e</button>
            <button class="key" data-scancode="0x13">r</button>
            <button class="key" data-scancode="0x14">t</button>
            <button class="key" data-scancode="0x15">y</button>
            <button class="key" data-scancode="0x16">u</button>
            <button class="key" data-scancode="0x17">i</button>
            <button class="key" data-scancode="0x18">o</button>
            <button class="key" data-scancode="0x19">p</button>
            <button class="key" data-scancode="0x0C">-</button>
        </div>
        <div class="keyboard_row">
            <button class="key modifier wide" id="caps_lock">CAPS</button>
            <button class="key" data-scancode="0x1E">a</button>
            <button class="key" data-scancode="0x1F">s</button>
            <button class="key" data-scancode="0x20">d</button>
            <button class="key" data-scancode="0x21">f</button>
            <button class="key" data-scancode="0x22">g</button>
            <button class="key" data-scancode="0x23">h</button>
            <button class="key" data-scancode="0x24">j</button>
            <button class="key" data-scancode="0x25">k</button>
            <button class="key" data-scancode="0x26">l</button>
            <button class="key" data-scancode="0x27">:</button>
            <button class="key wide" data-scancode="0x1C">ENTER</button>
        </div>
        <div class="keyboard_row">
            <button class="key modifier wide" id="shift_toggle">SHIFT</button>
            <button class="key" data-scancode="0x2C">z</button>
            <button class="key" data-scancode="0x2D">x</button>
            <button class="key" data-scancode="0x2E">c</button>
            <button class="key" data-scancode="0x2F">v</button>
            <button class="key" data-scancode="0x30">b</button>
            <button class="key" data-scancode="0x31">n</button>
            <button class="key" data-scancode="0x32">m</button>
            <button class="key" data-scancode="0x33">,</button>
            <button class="key" data-scancode="0x34">.</button>
            <button class="key" data-scancode="0x35">/</button>
            <button class="key arrow" data-scancode="0xE048">▲</button>
        </div>
        <div class="keyboard_row">
            <button class="key modifier" id="ctrl_toggle">CTRL</button>
            <button class="key modifier" id="alt_toggle">ALT</button>
            <button class="key arrow" data-scancode="0xE049">PGUP</button>
            <button class="key arrow" data-scancode="0xE051">PGDN</button>
            <button class="key space" data-scancode="0x39">SPACE</button>
            <button class="key arrow" data-scancode="0xE04B">◀</button>
            <button class="key arrow" data-scancode="0xE050">▼</button>
            <button class="key arrow" data-scancode="0xE04D">▶</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            var emulatorOptions = {
                wasm_path: "v86.wasm",
                memory_size: 512 * 1024 * 1024, // Bumped up from 256MB to 512MB
                vga_as_textmode: false, 
                screen_container: document.getElementById("screen_container"),
                bios: { url: "seabios.bin" },
                vga_bios: { url: "vgabios.bin" },
                cdrom: { url: "alpine-virt.iso" },
                autostart: true
            };

            var savedStateBase64 = localStorage.getItem("v86_alpine_state");
            if (savedStateBase64) {
                var binaryString = atob(savedStateBase64);
                var len = binaryString.length;
                var bytes = new Uint8Array(len);
                for (var i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                emulatorOptions.initial_state = { buffer: bytes.buffer };
            }

            var emulator = new V86(emulatorOptions);

            document.getElementById("save_state").addEventListener("click", function() {
                if (!emulator) return;
                var saveBtn = document.getElementById("save_state");
                saveBtn.innerText = "Saving...";
                saveBtn.disabled = true;

                emulator.save_state(function(err, state) {
                    if (err) {
                        alert("Error capturing core environment matrix: " + err);
                        saveBtn.innerText = "Save State";
                        saveBtn.disabled = false;
                        return;
                    }
                    var binary = "";
                    var bytes = new Uint8Array(state);
                    var len = bytes.byteLength;
                    for (var i = 0; i < len; i++) {
                        binary += String.fromCharCode(bytes[i]);
                    }
                    var base64 = btoa(binary);
                    
                    try {
                        localStorage.setItem("v86_alpine_state", base64);
                        saveBtn.innerText = "Saved!";
                        setTimeout(function() {
                            saveBtn.innerText = "Save State";
                            saveBtn.disabled = false;
                        }, 1500);
                    } catch(storageErr) {
                        alert("Storage limit exceeded.");
                        saveBtn.innerText = "Save State";
                        saveBtn.disabled = false;
                    }
                });
            });

            var toggleBtn = document.getElementById("kbd_toggle");
            var kbdOverlay = document.getElementById("keyboard_overlay");
            toggleBtn.addEventListener("click", function() {
                kbdOverlay.classList.toggle("hidden");
                toggleBtn.innerText = kbdOverlay.classList.contains("hidden") ? "Show Kbd" : "Hide Kbd";
            });

            var modifiers = {
                shift: { active: false, code: 0x2A, element: document.getElementById("shift_toggle") },
                ctrl: { active: false, code: 0x1D, element: document.getElementById("ctrl_toggle") },
                alt: { active: false, code: 0x38, element: document.getElementById("alt_toggle") }
            };

            function setupModifier(type) {
                modifiers[type].element.addEventListener("click", function() {
                    var mod = modifiers[type];
                    mod.active = !mod.active;
                    if (mod.active) {
                        mod.element.style.background = "#58a6ff";
                        mod.element.style.color = "#fff";
                        emulator.bus.send("keyboard-code", mod.code);
                    } else {
                        mod.element.style.background = "#1f242c";
                        mod.element.style.color = "#58a6ff";
                        emulator.bus.send("keyboard-code", mod.code | 0x80);
                    }
                });
            }

            setupModifier("shift");
            setupModifier("ctrl");
            setupModifier("alt");

            document.querySelectorAll(".key").forEach(function(keyBtn) {
                keyBtn.addEventListener("touchstart", function(e) {
                    e.preventDefault(); 
                    if (!emulator) return;

                    var hexString = keyBtn.getAttribute("data-scancode");
                    if (!hexString) return;

                    if (hexString.startsWith("0xE0")) {
                        var prefix = parseInt(hexString.substring(0, 4), 16); 
                        var secondary = parseInt(hexString.substring(4, 6), 16); 
                        
                        emulator.bus.send("keyboard-code", prefix);
                        emulator.bus.send("keyboard-code", secondary);

                        setTimeout(function() {
                            emulator.bus.send("keyboard-code", prefix);
                            emulator.bus.send("keyboard-code", secondary | 0x80);
                        }, 10);
                        return;
                    }

                    var scancode = parseInt(hexString, 16);
                    emulator.bus.send("keyboard-code", scancode);

                    setTimeout(function() {
                        emulator.bus.send("keyboard-code", scancode | 0x80);

                        ["shift", "ctrl", "alt"].forEach(function(type) {
                            var mod = modifiers[type];
                            if (mod.active) {
                                mod.active = false;
                                mod.element.style.background = "#1f242c";
                                mod.element.style.color = "#58a6ff";
                                emulator.bus.send("keyboard-code", mod.code | 0x80);
                            }
                        });
                    }, 10);
                });
            });
        };
    </script>
</body>
</html>
